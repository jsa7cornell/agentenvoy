name: Schema migration validator

# Runs on every PR that touches prisma/ AND every push to main that touches
# prisma/ — catches the class of incident where a migration file has invalid
# SQL or leaves the DB out of sync with schema.prisma.
# Uses a throwaway Postgres service container so no Supabase plan is needed.
#
# 2026-04-20: added `push: main` trigger. Previously PR-only, which meant a
# direct-to-main push could bypass it. Incident bcf2ec1 (create_link outage)
# was exactly that shape. With `push: main` enabled, Vercel's Ignored Build
# Step checks this workflow's status via scripts/vercel-ignore-build.sh — a
# failing validate run stops the deploy. See the schema-drift-recurrence
# proposal (2026-04-20) for the decision.
#
# Checks performed:
#   1. prisma migrate deploy  — all migration SQL runs cleanly on a fresh DB
#   2. prisma migrate status  — zero pending migrations after deploy
#   3. prisma db pull (diff)  — DB schema after migrations matches schema.prisma

on:
  pull_request:
    branches: [main]
    paths:
      - "prisma/schema.prisma"
      - "prisma/migrations/**"
  push:
    branches: [main]
    paths:
      - "prisma/schema.prisma"
      - "prisma/migrations/**"

jobs:
  validate-migrations:
    name: Validate migrations on fresh DB
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentenvoy_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Both URL and directUrl point at the local container — no pooler in CI.
      POSTGRES_PRISMA_URL: postgresql://postgres:postgres@localhost:5432/agentenvoy_ci
      POSTGRES_URL_NON_POOLING: postgresql://postgres:postgres@localhost:5432/agentenvoy_ci
      # Dummy values so prisma generate doesn't complain about missing vars.
      NEXTAUTH_SECRET: ci-dummy
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Deploy all migrations to fresh DB
        run: |
          echo "Running prisma migrate deploy against fresh Postgres..."
          npx prisma migrate deploy
          echo "✓ All migrations applied successfully."

      - name: Confirm zero pending migrations
        run: |
          echo "Checking prisma migrate status..."
          STATUS=$(npx prisma migrate status 2>&1)
          echo "$STATUS"
          if echo "$STATUS" | grep -q "following migration.*not yet applied\|pending"; then
            echo "::error::There are pending migrations after deploy. Check your migration files."
            exit 1
          fi
          echo "✓ No pending migrations."

      - name: Check schema.prisma matches DB (drift check)
        run: |
          echo "Checking semantic drift between schema.prisma and post-migration DB..."
          # Use prisma's own migration engine to compute the diff. This is a
          # SEMANTIC comparison (considers model structure, columns, indexes,
          # FKs) and ignores cosmetic differences like comments, @db.Text on
          # columns Postgres would store as TEXT anyway, and whitespace.
          #
          # --from-schema-datamodel: what schema.prisma says the DB should be
          # --to-schema-datasource:  what the DB actually has after migrations
          # --exit-code:             exit 2 if there's any drift, 0 if clean
          #
          # If this fails, run locally:
          #   npx prisma migrate diff \
          #     --from-schema-datamodel prisma/schema.prisma \
          #     --to-schema-datasource  prisma/schema.prisma \
          #     --script
          # to see the SQL that would close the drift.
          set +e
          npx prisma migrate diff \
            --from-schema-datamodel prisma/schema.prisma \
            --to-schema-datasource  prisma/schema.prisma \
            --exit-code
          CODE=$?
          set -e
          if [ "$CODE" -eq 0 ]; then
            echo "✓ schema.prisma matches DB after migrations (no drift)."
          elif [ "$CODE" -eq 2 ]; then
            echo "::error::Semantic drift detected between schema.prisma and migrated DB."
            echo "::error::Either a migration is missing or schema.prisma was edited without a matching migration."
            exit 1
          else
            echo "::error::prisma migrate diff failed with exit code $CODE (non-drift error)."
            exit 1
          fi
