name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run check

  # Catches the class of incident where schema.prisma is edited but no
  # matching migration file is committed. Four incidents in April 2026 had
  # this shape (guestTimezone, welcomeEmailSentAt, inviteeTimezone, hashSalt).
  #
  # 2026-04-20 update (schema-drift-recurrence proposal): this job now runs
  # on `push: main` as well as `pull_request`. The incident that prompted
  # the update was a direct-to-main push that bypassed the PR-only guard.
  # The old comment here claimed Vercel's buildCommand ran
  # `prisma migrate deploy` — that was reverted in 8d01afb and never
  # re-enabled. Migrations still apply via Supabase SQL Editor per
  # PLAYBOOK Rule 12 until Track A (deploy-time migrate) ships.
  schema-migration-match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for matching migration when schema.prisma changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            # First push to branch — github.event.before is all-zeros;
            # diff against the empty tree so we compare everything in HEAD.
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE=$(git hash-object -t tree /dev/null)
            fi
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"
          echo "$CHANGED"
          echo "---"

          SCHEMA_CHANGED=$(echo "$CHANGED" | grep -E '^prisma/schema\.prisma$' || true)
          MIGRATION_CHANGED=$(echo "$CHANGED" | grep -E '^prisma/migrations/' || true)

          if [ -n "$SCHEMA_CHANGED" ] && [ -z "$MIGRATION_CHANGED" ]; then
            echo "::error::schema.prisma was modified but no file under prisma/migrations/ was added or changed."
            echo "::error::Every schema change needs a matching prisma/migrations/<date>_<desc>/migration.sql file committed alongside."
            echo "::error::See PLAYBOOK Rule 12 + the External Configuration Checklist."
            echo "::error::Apply the SQL via Supabase SQL Editor before this deploy goes live (Vercel does NOT auto-run migrations)."
            exit 1
          fi

          if [ -n "$SCHEMA_CHANGED" ]; then
            echo "✓ schema.prisma changed and at least one migration file is present."
          else
            echo "✓ schema.prisma not modified; skipping check."
          fi

  # Integration tests — hit a real Postgres service container. See
  # app/src/__tests__/integration/README.md and the harness proposal
  # at proposals/2026-04-19_integration-test-harness_*.
  #
  # Schema provisioning: `prisma db push --skip-generate` (not `migrate
  # deploy`). This decouples the harness from migration folder hygiene;
  # migration validity is enforced by the `schema-migration-match` job
  # above and by the shipped schema-management-and-deploy-infra proposal.
  integration:
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentenvoy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
    env:
      # schema.prisma reads POSTGRES_PRISMA_URL (pooled) + POSTGRES_URL_NON_POOLING
      # (direct). In CI we point both at the local Postgres service container
      # since there's no pooler.
      POSTGRES_PRISMA_URL: postgresql://postgres:postgres@localhost:5432/agentenvoy_test
      POSTGRES_URL_NON_POOLING: postgresql://postgres:postgres@localhost:5432/agentenvoy_test
      EFFECT_MODE_EMAIL: log
      EFFECT_MODE_CALENDAR: dryrun
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma db push --skip-generate
      - run: npm run test:integration

  # PLAYBOOK Rule 19 (chat-decisioning-layer-redesign — 2026-04-27 PR1):
  # protects the architectural invariants that surfaced PR1's five prod bugs.
  #
  #  - 19c (single composition point): the host & guest playbooks are loaded
  #    via `readFileSync(join(process.cwd(), "src", "agent", "playbooks", ...)`
  #    inside `src/agent/intent-classifier.ts`. Adding a parallel composition
  #    site (a second readFileSync of an `intent-classifier-*.md` playbook
  #    elsewhere, or a runtime concat of host + guest prose in a route file)
  #    is what re-introduced classifier drift in earlier prototypes.
  #  - 19f (explicit role plumbing): every call site of `classifyChatIntent`
  #    must pass an explicit `role` argument. The default-to-guest branch was
  #    the root cause of Bugs #1/#2/#3 — silent default loaded the wrong
  #    playbook and emitted guest-shaped values for host turns.
  #
  # Both checks are deliberately greppy (no AST tooling) so the failure mode
  # is a clear CI line, not a mysterious type error. False-positive rate is
  # capped by the narrow allowlist below.
  playbook-rule-19:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rule 19c — single playbook composition site
        run: |
          # Allowlist: the one file that legitimately reads playbook .md
          # files for the classifier. Any other readFileSync of an
          # intent-classifier playbook is a violation.
          ALLOWED='src/agent/intent-classifier.ts'
          OFFENDERS=$(grep -rEn \
            "readFileSync\([^)]*intent-classifier-(host|guest)\.md" \
            src \
            --include='*.ts' --include='*.tsx' \
            | grep -v "^${ALLOWED}:" || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Rule 19c violated — intent-classifier playbooks must be loaded only from ${ALLOWED}."
            echo "$OFFENDERS"
            exit 1
          fi
          echo "✓ Rule 19c — only ${ALLOWED} loads intent-classifier playbooks."
      - name: Rule 19f — explicit role on every classifyChatIntent call
        run: |
          # Find every call site of classifyChatIntent, then for each one
          # confirm the third argument is one of "host" / "guest". Skip
          # the import / re-export / declaration lines, the test mocks,
          # and the implementation in the classifier itself.
          set -e
          CALLS=$(grep -rEn "classifyChatIntent\s*\(" src \
            --include='*.ts' --include='*.tsx' \
            | grep -vE "(^|/)src/agent/intent-classifier\.ts:" \
            | grep -vE "import |export " \
            | grep -vE "vi\.mock|classifyChatIntentMock|generateObjectMock" \
            || true)
          if [ -z "$CALLS" ]; then
            echo "::warning::No classifyChatIntent call sites detected — Rule 19f grep may have drifted."
            exit 0
          fi
          BAD=""
          while IFS= read -r line; do
            FILE=$(echo "$line" | cut -d: -f1)
            LNO=$(echo "$line" | cut -d: -f2)
            # Read up to 30 lines from the call site to capture
            # multi-line invocations; assert that one of "host"/"guest"
            # appears as a string literal before the closing ).
            BLOCK=$(sed -n "${LNO},$((LNO+30))p" "$FILE")
            # Truncate at the first ) at column 0..end of an arg-balanced
            # call — heuristic: strip everything after `;` or a trailing
            # `)` line. Good enough for the call shapes we use.
            if ! echo "$BLOCK" | grep -qE '"(host|guest)"'; then
              BAD="$BAD$line\n"
            fi
          done <<< "$CALLS"
          if [ -n "$BAD" ]; then
            echo "::error::Rule 19f violated — every classifyChatIntent() call must pass an explicit role: \"host\" | \"guest\"."
            printf "$BAD"
            exit 1
          fi
          echo "✓ Rule 19f — every classifyChatIntent call passes an explicit role."
