name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run check

  # Catches the class of incident where schema.prisma is edited but no
  # matching migration file is committed. Three incidents in April 2026 had
  # this shape (guestTimezone, welcomeEmailSentAt, inviteeTimezone).
  # Note: Vercel's buildCommand now runs `prisma migrate deploy` before
  # `next build`, so the migration SQL is applied automatically at deploy
  # time — manual Supabase SQL Editor runs are no longer required.
  # This job only runs on pull_request; direct-to-main pushes are trusted.
  schema-migration-match:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for matching migration when schema.prisma changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"
          echo "$CHANGED"
          echo "---"

          SCHEMA_CHANGED=$(echo "$CHANGED" | grep -E '^prisma/schema\.prisma$' || true)
          MIGRATION_CHANGED=$(echo "$CHANGED" | grep -E '^prisma/migrations/' || true)

          if [ -n "$SCHEMA_CHANGED" ] && [ -z "$MIGRATION_CHANGED" ]; then
            echo "::error::schema.prisma was modified but no file under prisma/migrations/ was added or changed."
            echo "::error::Every schema change needs a matching prisma/migrations/<date>_<desc>.sql file committed in the same PR."
            echo "::error::See PLAYBOOK Rule 12 + the External Configuration Checklist."
            echo "::error::Vercel's buildCommand runs 'prisma migrate deploy' automatically — add the migration SQL file and the deploy will apply it."
            exit 1
          fi

          if [ -n "$SCHEMA_CHANGED" ]; then
            echo "✓ schema.prisma changed and at least one migration file is present in this PR."
          else
            echo "✓ schema.prisma not modified; skipping check."
          fi

  # Integration tests — hit a real Postgres service container. See
  # app/src/__tests__/integration/README.md and the harness proposal
  # at proposals/2026-04-19_integration-test-harness_*.
  #
  # Schema provisioning: `prisma db push --skip-generate` (not `migrate
  # deploy`). This decouples the harness from migration folder hygiene;
  # migration validity is enforced by the `schema-migration-match` job
  # above and by the shipped schema-management-and-deploy-infra proposal.
  integration:
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentenvoy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agentenvoy_test
      POSTGRES_URL_NON_POOLING: postgresql://postgres:postgres@localhost:5432/agentenvoy_test
      EFFECT_MODE_EMAIL: log
      EFFECT_MODE_CALENDAR: dryrun
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma db push --skip-generate
      - run: npm run test:integration
