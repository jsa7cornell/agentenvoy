name: Post-deploy smoke test

# Runs after every push to main. Waits for Vercel to finish the deploy,
# then hits /api/admin/smoke and fails the job if any probe is unhealthy.
# A failing job sends a GitHub email notification to repository contributors.
#
# Prerequisites:
#   - ADMIN_SMOKE_TOKEN GitHub Actions secret (same value as in Vercel prod env)
#   - SMOKE_URL secret (default: https://agentenvoy.ai/api/admin/smoke)

on:
  push:
    branches: [main]

jobs:
  smoke:
    name: Smoke test (post-deploy)
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy to propagate
        # Poll until the smoke endpoint returns non-5xx, up to 8 minutes.
        # merge commits and large diffs take 3-5 min to build on Vercel Pro.
        env:
          ADMIN_SMOKE_TOKEN: ${{ secrets.ADMIN_SMOKE_TOKEN }}
          SMOKE_URL: ${{ secrets.SMOKE_URL || 'https://agentenvoy.ai/api/admin/smoke' }}
        run: |
          echo "Waiting for deploy (polling every 20s, up to 8 min)..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $ADMIN_SMOKE_TOKEN" \
              "$SMOKE_URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" != "502" ] && [ "$STATUS" != "503" ] && [ "$STATUS" != "504" ] && [ "$STATUS" != "000" ]; then
              echo "Deploy is live (got $STATUS)."
              exit 0
            fi
            sleep 20
          done
          echo "Deploy did not come up within 8 minutes."
          exit 1

      - name: Run smoke probe
        env:
          ADMIN_SMOKE_TOKEN: ${{ secrets.ADMIN_SMOKE_TOKEN }}
          SMOKE_URL: ${{ secrets.SMOKE_URL || 'https://agentenvoy.ai/api/admin/smoke' }}
        run: |
          echo "Hitting smoke endpoint: $SMOKE_URL"
          RESPONSE=$(curl -s -o /tmp/smoke-body.json -w "%{http_code}" \
            -H "Authorization: Bearer $ADMIN_SMOKE_TOKEN" \
            "$SMOKE_URL")

          echo "HTTP status: $RESPONSE"
          echo "Response body:"
          cat /tmp/smoke-body.json | python3 -m json.tool 2>/dev/null || cat /tmp/smoke-body.json

          if [ "$RESPONSE" != "200" ]; then
            echo ""
            echo "::error::Smoke test FAILED (HTTP $RESPONSE). Check /admin/failures and Vercel runtime logs."
            exit 1
          fi

          echo ""
          echo "✓ Smoke test passed."
